{% extends 'base.html' %}

{% block title %}Login | Farm2Market{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white border border-green-100 rounded-2xl shadow-sm p-6 sm:p-8">
        <h2 class="text-2xl font-bold text-green-800 text-center">Login</h2>
        <p class="text-sm text-green-700/80 text-center mt-1">Welcome back to Farm2Market</p>

        {% if messages %}
            <div class="mt-4 space-y-2">
                {% for message in messages %}
                    <div class="rounded-lg px-3 py-2 text-sm border
                        {% if message.tags == 'success' %}bg-green-100 text-green-800 border-green-200
                        {% elif message.tags == 'error' %}bg-red-100 text-red-800 border-red-200
                        {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border-yellow-200
                        {% else %}bg-blue-100 text-blue-800 border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="mt-6 space-y-4">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full rounded-lg border border-green-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400"
                    placeholder="Enter your username"
                />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full rounded-lg border border-green-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400"
                    placeholder="Enter your password"
                />
            </div>

            <button
                type="submit"
                class="w-full rounded-lg bg-green-600 text-white py-2.5 font-medium hover:bg-green-700 transition"
            >
                Login
            </button>
        </form>

        <p class="mt-5 text-sm text-center text-gray-600">
            Don’t have an account?
            <a href="/register/" class="text-green-700 font-medium hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
