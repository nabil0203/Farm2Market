{% extends 'base.html' %}
{% block title %}Buyer Dashboard{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h2 class="text-2xl sm:text-3xl font-bold text-green-800">{{user.username}}'s Dashboard</h2>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border border-green-100">
        <p class="text-lg text-gray-700">Welcome, <span class="font-semibold text-green-700">{{ user.username }}</span>!</p>
        <p class="mt-2 text-gray-600">This is your dashboard where you can track your purchases and orders.</p>
    </div>
</div>
{% endblock %}
