{% extends "base.html" %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-green-50 py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md mx-auto">
    <!-- Messages -->
    {% if messages %}
      <div class="space-y-3 mb-6">
        {% for message in messages %}
          <div class="rounded-lg px-4 py-3 text-sm font-medium
            {% if message.tags == 'success' %}
              bg-green-100 text-green-800 border border-green-200
            {% elif message.tags == 'error' %}
              bg-red-100 text-red-800 border border-red-200
            {% else %}
              bg-green-100 text-green-900 border border-green-200
            {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 border border-green-100">
      <h1 class="text-2xl font-bold text-green-800 text-center mb-2">Create Your Account</h1>
      <p class="text-sm text-green-700 text-center mb-6">Join Farm2Market and get started in minutes.</p>

      <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
          <label for="username" class="block text-sm font-medium text-green-900 mb-1">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
            placeholder="Enter your username"
          >
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-green-900 mb-1">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
            placeholder="Enter your email"
          >
        </div>

        <div>
          <label for="password1" class="block text-sm font-medium text-green-900 mb-1">Password</label>
          <input
            type="password"
            id="password1"
            name="password1"
            required
            class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
            placeholder="Create a password"
          >
        </div>

        <div>
          <label for="password2" class="block text-sm font-medium text-green-900 mb-1">Confirm Password</label>
          <input
            type="password"
            id="password2"
            name="password2"
            required
            class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
            placeholder="Confirm your password"
          >
        </div>

        <div>
          <label for="role" class="block text-sm font-medium text-green-900 mb-1">Role</label>
          <select
            id="role"
            name="role"
            required
            class="w-full rounded-lg border border-green-200 px-3 py-2.5 bg-white focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
          >
            <option value="">Select your role</option>
            <option value="farmer">Farmer</option>
            <option value="buyer">Buyer</option>
          </select>
        </div>

        <!-- Farmer fields -->
        <div id="farmerFields" class="hidden space-y-4">
          <div>
            <label for="farm_name" class="block text-sm font-medium text-green-900 mb-1">Farm Name</label>
            <input
              type="text"
              id="farm_name"
              name="farm_name"
              class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
              placeholder="Enter farm name"
            >
          </div>

          <div>
            <label for="farm_location" class="block text-sm font-medium text-green-900 mb-1">Farm Location</label>
            <input
              type="text"
              id="farm_location"
              name="farm_location"
              class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
              placeholder="Enter farm location"
            >
          </div>

          <div>
            <label for="bio" class="block text-sm font-medium text-green-900 mb-1">Bio <span class="text-green-600">(Optional)</span></label>
            <textarea
              id="bio"
              name="bio"
              rows="3"
              class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
              placeholder="Tell buyers a bit about your farm"
            ></textarea>
          </div>
        </div>

        <!-- Buyer fields -->
        <div id="buyerFields" class="hidden">
          <label for="delivery_address" class="block text-sm font-medium text-green-900 mb-1">Delivery Address</label>
          <textarea
            id="delivery_address"
            name="delivery_address"
            rows="3"
            class="w-full rounded-lg border border-green-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
            placeholder="Enter your delivery address"
          ></textarea>
        </div>

        <button
          type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition-colors"
        >
          Register
        </button>
      </form>

      <p class="text-center text-sm text-green-800 mt-5">
        Already have an account?
        <a href="{% url 'login' %}" class="font-semibold text-green-700 hover:text-green-900 underline">
          Login
        </a>
      </p>
    </div>
  </div>
</div>

<script>
  (function () {
    const roleSelect = document.getElementById('role');
    const farmerFields = document.getElementById('farmerFields');
    const buyerFields = document.getElementById('buyerFields');

    const farmName = document.getElementById('farm_name');
    const farmLocation = document.getElementById('farm_location');
    const deliveryAddress = document.getElementById('delivery_address');

    function toggleRoleFields() {
      const role = roleSelect.value;

      if (role === 'farmer') {
        farmerFields.classList.remove('hidden');
        buyerFields.classList.add('hidden');

        farmName.required = true;
        farmLocation.required = true;
        deliveryAddress.required = false;
      } else if (role === 'buyer') {
        buyerFields.classList.remove('hidden');
        farmerFields.classList.add('hidden');

        deliveryAddress.required = true;
        farmName.required = false;
        farmLocation.required = false;
      } else {
        farmerFields.classList.add('hidden');
        buyerFields.classList.add('hidden');

        farmName.required = false;
        farmLocation.required = false;
        deliveryAddress.required = false;
      }
    }

    roleSelect.addEventListener('change', toggleRoleFields);
    toggleRoleFields();
  })();
</script>
{% endblock %}
